name: Build Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install NDK
        run: |
          SDKMANAGER=$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER=$ANDROID_HOME/tools/bin/sdkmanager
          fi
          if [ ! -f "$SDKMANAGER" ]; then
            echo "sdkmanager not found, searching..."
            find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null
            exit 1
          fi
          yes | $SDKMANAGER --licenses
          $SDKMANAGER --install "ndk;27.3.13750724"
          echo "NDK installed:"
          ls $ANDROID_HOME/ndk/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.12

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Locate and rename .so files
        run: |
          mkdir -p artifacts
          for abi in arm64-v8a armeabi-v7a x86_64 x86; do
            so_path=$(find build/ -name "libmobileglues.so" -path "*$abi*" 2>/dev/null | head -1)
            if [ -n "$so_path" ]; then
              cp "$so_path" "artifacts/${abi}_mobileglues.so"
              echo "Copied: $abi -> ${abi}_mobileglues.so"
            else
              echo "No .so found for ABI: $abi"
            fi
          done
          echo "--- Build output tree ---"
          find build/ -name "*.so" 2>/dev/null | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: mobileglues-android
          path: artifacts/
          archive: true
